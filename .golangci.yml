version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - nilerr
    - unconvert
  settings:
    errorlint:
      errorf: true
      asserts: false
      comparison: false
    gocritic:
      disabled-checks:
        - appendAssign
        - hugeParam
        - rangeValCopy
        - singleCaseSwitch
      enabled-tags:
        - diagnostic
        - performance
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocritic
        path: _test\.go
      - linters:
          - gocritic
          - nilerr
        path: cmd/mcp\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
