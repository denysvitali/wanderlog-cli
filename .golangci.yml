run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - gofmt
    - misspell
    - unconvert
    - bodyclose
    - nilerr
    - errorlint

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - appendAssign
      - hugeParam
      - rangeValCopy
      - singleCaseSwitch

  errorlint:
    errorf: true
    asserts: false
    comparison: false

  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
    - path: cmd/mcp\.go
      linters:
        - gocritic
        - nilerr
  max-issues-per-linter: 50
  max-same-issues: 10
