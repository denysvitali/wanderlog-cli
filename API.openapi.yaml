openapi: "3.0.3"
info:
  title: Wanderlog API
  description: |
    Reverse-engineered API specification for the Wanderlog travel planning platform.

    This specification was generated by decompiling the API bundle
    from Wanderlog's Android app (hermes v96, 67k functions, 218k strings).
    All endpoints were extracted from `wrappedAxios()` calls in the reference
    React Native (Metro) modules.

    Base URL: https://wanderlog.com/api
    Client version: 2 (sent as `clientSchemaVersion` in many requests)
    Default timeout: 15,000ms (wrappedAxios default)
  version: "1.0.0"
  x-generated-by: hermes-decomp (Rust) / API v96 extraction
  x-bundle-info:
    functions: 67030
    strings: 218797
    modules: 7274

servers:
  - url: https://wanderlog.com/api
    description: Production API

security:
  - SessionCookie: []
    XSRFToken: []

components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Express session cookie, obtained from POST /api/user/login
    XSRFToken:
      type: apiKey
      in: header
      name: x-xsrf-token
      description: XSRF token returned in login response, required for all mutating requests

  parameters:
    TripKey:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: Trip plan key (e.g., "yxjmjivtfxlkaqcp")
    SectionId:
      name: sectionId
      in: path
      required: true
      schema:
        type: integer
      description: Itinerary section/day ID
    PlaceId:
      name: placeId
      in: path
      required: true
      schema:
        type: integer
      description: Place entry ID within a trip
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
      description: User ID
    GeoId:
      name: geoId
      in: path
      schema:
        type: integer
      description: Wanderlog geo/destination ID
    ClientSchemaVersion:
      name: clientSchemaVersion
      in: query
      schema:
        type: integer
        default: 2
      description: Client schema version for data compatibility

  schemas:
    # ==================== Trip Plan ====================
    TripPlanCreate:
      type: object
      properties:
        startDate:
          type: string
          format: date
          description: Trip start date (YYYY-MM-DD)
          example: "2026-05-10"
        endDate:
          type: string
          format: date
          example: "2026-05-20"
        title:
          type: string
          example: "Japan Adventure"
        privacy:
          type: string
          enum: [public, private, unlisted]
          default: private
        geoId:
          type: integer
          description: Destination geo ID
      required: [startDate, endDate, title]

    TripPlanResponse:
      type: object
      properties:
        success:
          type: boolean
        tripPlan:
          $ref: '#/components/schemas/TripPlan'
      x-reference-from: function f37561

    TripPlan:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
        editKey:
          type: string
        title:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        privacy:
          type: string
          enum: [public, private, unlisted, friends]
        collaboratorIds:
          type: array
          items:
            type: integer
        metadata:
          type: object
          properties:
            coverPhoto:
              type: string
            destinationNames:
              type: array
              items:
                type: string
            dayCount:
              type: integer

    ApplyOpsRequest:
      type: object
      properties:
        ops:
          type: array
          items:
            type: object
            description: ShareDB JSON0 operation
            properties:
              p:
                type: array
                items: {}
                description: Path array
              oi:
                $ref: '#/components/schemas/OperationValue'
              od:
                $ref: '#/components/schemas/OperationValue'
              li:
                $ref: '#/components/schemas/OperationValue'
              ld:
                $ref: '#/components/schemas/OperationValue'
      required: [ops]

    OperationValue: {}

    # ==================== Places ====================
    AddPlaceRequest:
      type: object
      description: Legacy single-place shape. The Android bundle uses AddPlacesRequest for native add-place calls.
      properties:
        place:
          type: object
          properties:
            place_id:
              type: string
              description: Google Place ID
            name:
              type: string
            geometry:
              type: object
              properties:
                location:
                  type: object
                  properties:
                    lat:
                      type: number
                      format: double
                    lng:
                      type: number
                      format: double
        text:
          type: string
          description: Optional notes for the place

    AddPlacesRequest:
      type: object
      description: Reference from function 37663. Adds one or more places to a trip section.
      properties:
        places:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Place objects to add. Usually Wanderlog autocomplete/detail objects.
        addDuplicates:
          type: boolean
          description: Whether duplicate places may be added to the trip.
      required: [places]

    RemovePlacesRequest:
      type: object
      description: Reference from function 37666. Removes one or more places by Wanderlog place/block ID.
      properties:
        placeIds:
          type: array
          items:
            type: integer
      required: [placeIds]

    PlacesAutocompleteRequest:
      type: object
      description: JSON value stringified into the `request` query parameter for autocomplete endpoints.
      properties:
        input:
          type: string
        sessiontoken:
          type: string
          description: Places autocomplete session token generated by the client.
        location:
          type: object
          nullable: true
          properties:
            lat:
              type: number
              format: double
            lng:
              type: number
              format: double
        radius:
          type: number
          nullable: true
        language:
          type: string
      required: [input, sessiontoken, language]

    PlaceObject:
      type: object
      properties:
        id:
          type: integer
        placeId:
          type: string
          description: Google Place ID
        name:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        rating:
          type: number
          format: float
        priceLevel:
          type: integer
        types:
          type: array
          items:
            type: string
        photoUrl:
          type: string
        url:
          type: string
        notes:
          type: string
        sectionId:
          type: integer

    # ==================== Flights ====================
    FlightStopsRequest:
      type: object
      properties:
        airlineIata:
          type: string
          example: "NH"
        flightNumber:
          type: string
          example: "7"
        departDate:
          type: string
          format: date
          example: "2026-05-10"

    FlightStopsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            departureAirport:
              type: object
              properties:
                code:
                  type: string
                name:
                  type: string
            arrivalAirport:
              type: object
              properties:
                code:
                  type: string
                name:
                  type: string
            departureTime:
              type: string
            arrivalTime:
              type: string
            duration:
              type: integer
            stops:
              type: integer
            segments:
              type: array
              items:
                type: object

    # ==================== Lodging ====================
    LodgingSearchRequest:
      type: object
      description: Native lodging search request body passed directly as JSON to function 51399.
      properties:
        bounds:
          type: object
          properties:
            swLat:
              type: number
            swLng:
              type: number
            neLat:
              type: number
            neLng:
              type: number
        dates:
          type: object
          properties:
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
          required: [startDate, endDate]
        guests:
          type: integer
          default: 2
        destination:
          type: string
          description: City or area name
        source:
          type: string
          enum: [google, kayak]

    AutofillDayRequest:
      type: object
      description: Reference from function 37715.
      properties:
        tripPlanId:
          type: integer
        sectionDate:
          type: string
          format: date
        geoId:
          type: integer
        language:
          type: string
          description: Added by the client from getAPILanguageForClient().
      required: [tripPlanId, sectionDate, geoId, language]

    ChecklistSectionRequest:
      type: object
      description: Reference from function 37719.
      properties:
        tripPlanId:
          type: integer
        items:
          type: array
          items:
            type: string
      required: [tripPlanId, items]

    DistancesForModeRequest:
      type: object
      description: Traced through function 26282 into function 26405.
      properties:
        placeRuns:
          type: array
          description: Runs of places/blocks to calculate distances for.
          items:
            type: array
            items:
              type: object
              additionalProperties: true
        travelMode:
          type: string
          description: Travel mode, such as driving, walking, bicycling, or transit.
      required: [placeRuns, travelMode]

    OptimizeRouteRequest:
      type: object
      description: Traced through optimizeRouteForSection in function 62671 into function 26411.
      properties:
        places:
          type: array
          items:
            type: object
            additionalProperties: true
        travelMode:
          type: string
        useAutosuggest:
          type: boolean
        sourceId:
          type: integer
          nullable: true
          description: Optional start endpoint block/place ID.
        destinationId:
          type: integer
          nullable: true
          description: Optional end endpoint block/place ID.
      required: [places, travelMode, useAutosuggest]

    # ==================== User ====================
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        user:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
            name:
              type: string
            username:
              type: string

    SetLikeRequest:
      type: object
      properties:
        liked:
          type: boolean

    SendInvitesRequest:
      type: object
      properties:
        invitees:
          type: array
          items:
            type: string
            format: email
        message:
          type: string

    ShareKeyRequest:
      type: object
      properties:
        permissions:
          type: object
          properties:
            canEdit:
              type: boolean
            canView:
              type: boolean

    CollaboratorAction:
      type: object
      properties:
        userId:
          type: integer

    # ==================== Geo ====================
    GeoSearchParams:
      type: object
      properties:
        query:
          type: string
        language:
          type: string
          default: en
        limit:
          type: integer
          default: 10

    # ==================== Common ====================
    SuccessResponse:
      type: object
      description: Standard Wanderlog response envelope for mutations and commands where the bundle does not expose a richer response shape.
      properties:
        success:
          type: boolean
        data:
          type: object
          additionalProperties: true
          nullable: true
        messages:
          type: array
          items:
            type: string
        errTypes:
          type: array
          items:
            type: string

    GenericObjectResponse:
      type: object
      description: Standard response envelope for endpoints returning a domain object whose internal shape is passed through by the React Native bundle.
      properties:
        success:
          type: boolean
        data:
          type: object
          additionalProperties: true

    GenericArrayResponse:
      type: object
      description: Standard response envelope for endpoints returning arrays of domain objects whose internal shape is passed through by the React Native bundle.
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            additionalProperties: true

    CsvUrlResponse:
      type: object
      description: Response envelope for endpoints that create or return a URL to a CSV/export artifact.
      properties:
        success:
          type: boolean
        url:
          type: string
          format: uri
        data:
          type: object
          additionalProperties: true

    LikeCountResponse:
      type: object
      properties:
        success:
          type: boolean
        likeCount:
          type: integer
        liked:
          type: boolean
        data:
          type: object
          additionalProperties: true

    ShareKeyResponse:
      type: object
      properties:
        success:
          type: boolean
        key:
          type: string
        shareKey:
          type: string
        data:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        messages:
          type: array
          items:
            type: string
        errTypes:
          type: array
          items:
            type: string

paths:
  # ==================== Trip Plans ====================
  /tripPlans:
    get:
      operationId: listUserTripPlans
      summary: List all trip plans for the authenticated user
      x-function-id: 37593
      x-reference: "GET /api/tripPlans"
      security:
        - SessionCookie: []
        - XSRFToken: []
      responses:
        "200":
          description: List of user's trip plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  tripPlans:
                    type: array
                    items:
                      $ref: '#/components/schemas/TripPlan'
    post:
      operationId: createTripPlan
      summary: Create a new trip plan
      x-function-id: 37561
      x-reference: "POST /api/tripPlans with body: { ...args, language }"
      security:
        - SessionCookie: []
        - XSRFToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/TripPlanCreate'
                - type: object
                  properties:
                    language:
                      type: string
                      default: en
      responses:
        "200":
          description: Created trip plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripPlanResponse'

  /tripPlans/{key}:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getTripPlan
      summary: Get a single trip plan by key
      x-function-id: 37574
      x-reference: "GET /api/tripPlans/{key} params: {clientSchemaVersion, registerView}"
      parameters:
        - $ref: '#/components/parameters/ClientSchemaVersion'
        - name: registerView
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Trip plan with full itinerary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripPlanResponse'
    delete:
      operationId: deleteTripPlan
      summary: Delete a trip plan
      x-function-id: 37587
      x-reference: "DELETE /api/tripPlans/{key}"
      security:
        - SessionCookie: []
        - XSRFToken: []
      responses:
        "200":
          description: Trip deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tripPlans/copy/{key}:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: copyTripPlan
      summary: Copy a trip plan
      x-function-id: 37571
      x-reference: "POST /api/tripPlans/copy/{key}"
      security:
        - SessionCookie: []
        - XSRFToken: []
      responses:
        "200":
          description: Copy of the trip plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripPlanResponse'

  /tripPlans/{key}/restore:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: restoreTripPlan
      summary: Restore a soft-deleted trip plan
      x-function-id: 37590
      x-reference: "POST /api/tripPlans/{key}/restore"
      security:
        - SessionCookie: []
        - XSRFToken: []
      responses:
        "200":
          description: Trip restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tripPlans/{key}/sections:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getTripPlanSections
      summary: Get all itinerary sections/days for a trip
      x-function-id: 37659
      x-reference: "GET /api/tripPlans/{key}/sections params: {datePreference}"
      parameters:
        - name: datePreference
          in: query
          schema:
            type: string
            enum: [day, month]
      responses:
        "200":
          description: Array of itinerary sections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArrayResponse'

  /tripPlans/{key}/places:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getTripPlanPlaces
      summary: Get all places for a trip plan
      x-function-id: 37583
      x-reference: "GET /api/tripPlans/{key}/places"
      responses:
        "200":
          description: Array of places
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArrayResponse'

  /tripPlans/{key}/sections/places:
    parameters:
      - $ref: '#/components/parameters/TripKey'
    post:
      operationId: addPlacesToTripPlanWithoutSection
      summary: Add places to a trip without a specific itinerary section
      x-function-id: 37663
      x-reference: "POST /api/tripPlans/{key}/sections/places body: {places, addDuplicates}"
      security:
        - SessionCookie: []
        - XSRFToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPlacesRequest'
      responses:
        "200":
          description: Places added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      operationId: removePlacesFromTripPlanWithoutSection
      summary: Remove places from a trip without a specific itinerary section
      x-function-id: 37666
      x-reference: "DELETE /api/tripPlans/{key}/sections/places body: {placeIds}"
      security:
        - SessionCookie: []
        - XSRFToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemovePlacesRequest'
      responses:
        "200":
          description: Places removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tripPlans/{key}/sections/{sectionId}/places:
    parameters:
      - $ref: '#/components/parameters/TripKey'
      - $ref: '#/components/parameters/SectionId'
    post:
      operationId: addPlacesToTripPlan
      summary: Add places to a specific itinerary section
      x-function-id: 37663
      x-reference: "POST /api/tripPlans/{key}/sections/{sectionId}/places body: {places, addDuplicates}"
      security:
        - SessionCookie: []
        - XSRFToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPlacesRequest'
      responses:
        "200":
          description: Places added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      operationId: removePlacesFromTripPlan
      summary: Remove places from an itinerary section
      x-function-id: 37666
      x-reference: "DELETE /api/tripPlans/{key}/sections/{sectionId}/places body: {placeIds}"
      security:
        - SessionCookie: []
        - XSRFToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemovePlacesRequest'
      responses:
        "200":
          description: Places removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tripPlans/{key}/applyOps:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: applyOpsToTripPlan
      summary: Apply ShareDB operational transforms for complex edits
      x-function-id: 37675
      x-reference: "POST /api/tripPlans/{key}/applyOps body: {ops: array}"
      security:
        - SessionCookie: []
        - XSRFToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyOpsRequest'
      responses:
        "200":
          description: Operations applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tripPlans/{key}/images:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getTripPlanImages
      summary: Get images for a trip plan
      x-function-id: 37580
      x-reference: "GET /api/tripPlans/{key}/images"
      responses:
        "200":
          description: Array of image objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArrayResponse'

  /tripPlans/{key}/image:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: uploadTripPlanImage
      summary: Upload an image to a trip plan
      x-function-id: 37577
      x-reference: "POST /api/tripPlans/{key}/image multipart upload, Content-Type: file.type, timeout: 120s"
      security:
        - SessionCookie: []
        - XSRFToken: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tripPlans/{key}/export/v2:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: exportTripPlan
      summary: Export a trip plan (e.g., to Google Maps)
      x-function-id: 37639
      x-reference: "POST /api/tripPlans/{key}/export/v2 timeout: 300s"
      security:
        - SessionCookie: []
        - XSRFToken: []
      responses:
        "200":
          description: Export initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsvUrlResponse'

  /tripPlans/{key}/createGuideFromTripPlan:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: createGuideFromTripPlan
      summary: Promote a trip plan into a published guide
      x-function-id: 37678
      x-reference: "POST /api/tripPlans/{key}/createGuideFromTripPlan"
      security:
        - SessionCookie: []
        - XSRFToken: []
      responses:
        "200":
          description: Guide created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tripPlans/{key}/updateTripPlanGeo/{geoId}:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
      - name: geoId
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: updateTripPlanGeo
      summary: Update the destination geo for a trip plan
      x-function-id: 37681
      x-reference: "POST /api/tripPlans/{key}/updateTripPlanGeo/{geoId}"
      security:
        - SessionCookie: []
        - XSRFToken: []
      responses:
        "200":
          description: Geo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tripPlans/{key}/updateRequired:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: checkIfUpdateRequired
      summary: Check if a trip plan requires a schema update
      x-function-id: 37684
      x-reference: "GET /api/tripPlans/{key}/updateRequired params: {clientSchemaVersion}"
      parameters:
        - $ref: '#/components/parameters/ClientSchemaVersion'
      responses:
        "200":
          description: Update status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponse'

  /tripPlans/{key}/registerView:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: registerTripPlanView
      summary: Register a view of a shared trip
      x-function-id: 37696
      x-reference: "POST /api/tripPlans/{key}/registerView"
      security:
        - SessionCookie: []
        - XSRFToken: []
      responses:
        "200":
          description: View registered
          content:
            application/json:
