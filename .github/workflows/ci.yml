name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
      - name: Run golangci-lint
        run: |
          go version
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
          "$(go env GOPATH)/bin/golangci-lint" run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
      - name: Run tests
        run: go version && go test -race -coverprofile=coverage.out ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
      - name: Build
        run: |
          go version
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w" -o wanderlog-${{ matrix.goos }}-${{ matrix.goarch }} .

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    # Only run on master/main branch pushes, not pull requests
    # because secrets are not available to PRs from forks
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
      - name: Run integration tests
        env:
          INTEGRATION_TESTS: "1"
          WANDERLOG_AUTH_EMAIL: ${{ secrets.WANDERLOG_AUTH_EMAIL }}
          WANDERLOG_AUTH_PASSWORD: ${{ secrets.WANDERLOG_AUTH_PASSWORD }}
        run: go version && go test -v ./cmd/... -run "Integration"
