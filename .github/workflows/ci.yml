name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -coverprofile=coverage.out ./...
        env:
          INTEGRATION_TESTS: "0"
      - uses: actions/upload-artifact@v7
        if: success()
        continue-on-error: true
        with:
          name: coverage
          path: coverage.out
          retention-days: 3

  build:
    name: Build
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build -ldflags "-s -w" -o wanderlog .

  integration-test:
    name: Integration Test
    runs-on: self-hosted
    # Only run on master/main branch pushes, not pull requests
    # because secrets are not available to PRs from forks
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run integration tests
        env:
          INTEGRATION_TESTS: "1"
          WANDERLOG_AUTH_EMAIL: ${{ secrets.WANDERLOG_AUTH_EMAIL }}
          WANDERLOG_AUTH_PASSWORD: ${{ secrets.WANDERLOG_AUTH_PASSWORD }}
        run: go test -v ./cmd/... -run "Integration"
